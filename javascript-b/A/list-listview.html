<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product ListView</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-zinc-950 text-zinc-100 antialiased">
  <main class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-4xl">
      <!-- Header -->
      <div class="mb-4 flex items-start justify-between gap-3">
        <div>
          <h1 class="text-xl sm:text-2xl font-semibold tracking-tight">Products</h1>
          <p class="mt-1 text-sm text-zinc-400">Responsive listview with actions</p>
        </div>

        <div class="shrink-0 rounded-xl border border-zinc-800 bg-zinc-900/40 px-3 py-2">
          <p class="text-xs text-zinc-400">Total</p>
          <p id="productCount" class="text-lg font-semibold leading-none">—</p>
        </div>
      </div>

      <!-- List Container -->
      <div class="rounded-2xl border border-zinc-800 bg-zinc-900/40 shadow-sm overflow-hidden">
        <!-- Column labels (hidden on mobile) -->
        <div class="hidden sm:grid grid-cols-12 gap-3 px-4 py-3 border-b border-zinc-800 bg-zinc-900/60">
          <div class="col-span-2 text-xs font-semibold uppercase tracking-wider text-zinc-400">ID</div>
          <div class="col-span-4 text-xs font-semibold uppercase tracking-wider text-zinc-400">Name</div>
          <div class="col-span-2 text-xs font-semibold uppercase tracking-wider text-zinc-400">Price</div>
          <div class="col-span-2 text-xs font-semibold uppercase tracking-wider text-zinc-400">Availability</div>
          <div class="col-span-2 text-xs font-semibold uppercase tracking-wider text-zinc-400 text-right">Action</div>
        </div>

        <!-- Items get injected here -->
        <div id="listRoot" class="divide-y divide-zinc-800"></div>

        <!-- Empty state -->
        <div id="emptyState" class="hidden px-4 py-10 text-center">
          <p class="text-sm text-zinc-400">No products to display.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Simple Popup (Modal) -->
  <div id="modalBackdrop" class="fixed inset-0 hidden items-center justify-center bg-black/60 p-4">
    <div class="w-full max-w-md rounded-2xl border border-zinc-800 bg-zinc-950 shadow-xl">
      <div class="flex items-center justify-between border-b border-zinc-800 px-4 py-3">
        <h2 class="text-sm font-semibold text-zinc-200">Clicked Product</h2>
        <button
          id="modalCloseBtn"
          class="rounded-lg px-2 py-1 text-zinc-300 hover:bg-zinc-900 hover:text-zinc-100 transition"
          aria-label="Close modal"
          type="button"
        >
          ✕
        </button>
      </div>

      <div class="px-4 py-4">
        <p class="text-sm text-zinc-400">Product ID:</p>
        <p id="modalId" class="mt-2 text-2xl font-semibold text-zinc-100">—</p>

        <div class="mt-5 flex justify-end">
          <button
            id="modalOkBtn"
            class="rounded-xl bg-zinc-100 px-4 py-2 text-sm font-semibold text-zinc-950 hover:bg-white transition"
            type="button"
          >
            OK
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="list-listview.js"></script>
</body>
</html>
